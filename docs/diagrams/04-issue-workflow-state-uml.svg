<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Issue Workflow State UML</title>
  <desc id="desc">State machine diagram for issue lifecycle transitions.</desc>
  <defs>
    <style>
      .title { fill: var(--text); font: 700 30px 'Segoe UI', Arial, sans-serif; }
      .state { fill: var(--card); stroke: var(--line); stroke-width: 2.5; rx: 40; ry: 40; }
      .name { fill: var(--text); font: 700 24px 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .meta { fill: var(--muted); font: 500 17px 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .edge { stroke: var(--line); stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .edge-label { fill: var(--muted); font: 500 16px 'Segoe UI', Arial, sans-serif; }
      .start { fill: var(--line); }
      .end { fill: none; stroke: var(--line); stroke-width: 3; }
      .end-inner { fill: var(--line); }
      :root { --text: #0f172a; --muted: #334155; --line: #1e293b; --card: rgba(255,255,255,0.08); }
      @media (prefers-color-scheme: dark) {
        :root { --text: #e2e8f0; --muted: #94a3b8; --line: #cbd5e1; --card: rgba(255,255,255,0.03); }
      }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="var(--line)" />
    </marker>
  </defs>

  <text x="70" y="70" class="title">Issue Workflow State UML (per project)</text>

  <circle cx="120" cy="230" r="18" class="start" />
  <path d="M138 230 L260 230" class="edge" />

  <rect x="260" y="170" width="240" height="120" class="state" />
  <text x="380" y="225" class="name">Todo</text>
  <text x="380" y="255" class="meta">Initial state</text>

  <rect x="620" y="170" width="260" height="120" class="state" />
  <text x="750" y="225" class="name">In Progress</text>
  <text x="750" y="255" class="meta">Assigned and active</text>

  <rect x="1020" y="170" width="240" height="120" class="state" />
  <text x="1140" y="225" class="name">Done</text>
  <text x="1140" y="255" class="meta">Final state</text>

  <path d="M500 230 L620 230" class="edge" />
  <text x="545" y="210" class="edge-label">Start Progress</text>

  <path d="M880 230 L1020 230" class="edge" />
  <text x="930" y="210" class="edge-label">Resolve</text>

  <path d="M1140 290 L1140 390" class="edge" />
  <circle cx="1140" cy="450" r="32" class="end" />
  <circle cx="1140" cy="450" r="18" class="end-inner" />

  <rect x="260" y="460" width="1000" height="250" class="state" />
  <text x="300" y="510" class="name" text-anchor="start">Validation Rules</text>
  <text x="300" y="555" class="meta" text-anchor="start">• Every issue starts from the workflow initial state configured for its project.</text>
  <text x="300" y="590" class="meta" text-anchor="start">• Transition executes only if (current_state + transition_name) exists in workflow_transitions.</text>
  <text x="300" y="625" class="meta" text-anchor="start">• Developers/Admin can transition; Reporter cannot transition by default RBAC policy.</text>
  <text x="300" y="660" class="meta" text-anchor="start">• Invalid edge returns domain INVALID_TRANSITION error and no DB update occurs.</text>
</svg>
